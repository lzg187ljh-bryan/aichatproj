# Docker Compose - 本地开发与生产部署
# 使用: docker-compose up --build

services:
  # Next.js 应用
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # 构建时需要的 NEXT_PUBLIC_* 变量
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        - NEXT_PUBLIC_USE_AI=${NEXT_PUBLIC_USE_AI:-mock}
    container_name: ai-chat-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - HOSTNAME=0.0.0.0
      # Supabase 配置（生产环境使用）
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      # AI Provider
      - NEXT_PUBLIC_USE_AI=${NEXT_PUBLIC_USE_AI:-mock}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ai-chat-network
    # 生产环境资源限制
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx 反向代理
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: ai-chat-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      # 生产环境取消注释启用 HTTPS
      # - "${HTTPS_PORT:-443}:443"
    depends_on:
      nextjs:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ai-chat-network
    # 健康检查
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  ai-chat-network:
    driver: bridge

